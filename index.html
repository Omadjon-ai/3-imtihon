<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base apparel coming ...</title>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div class="parent">
      <div class="one-child">
        <img class="logo" src="./images/Group.png" alt="logo icon" />
        <h1 class="title"><span>WE'RE</span> COMING SOON</h1>
        <p class="text">
          Hello fellow shoppers! We're currently building our new fashion store.
          Add your email below to stay up-to-date with announcements and our
          launch deals.
        </p>
        <div class="email">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email Address"
            autocomplete="email"
            required
          />
          <span class="error">Please provide a valid email</span>
          <button class="btn">➜</button>
        </div>
      </div>
      <div class="image">
        <img src="./images/Bitmap.png" alt="bitmap.png" />
      </div>
    </div>
  </body>
</html>
